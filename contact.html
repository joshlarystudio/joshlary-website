<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact — Josh Lary</title>
<style>
  :root {
    --bg: #4d3838;
    --fg: #ffffff;
    --dim: #8c7373;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ---------- nav ---------- */
  nav {
    position: fixed;
    left: clamp(40px, 6vw, 96px);
    top: clamp(80px, 14vh, 180px);
    display: flex;
    flex-direction: column;
    gap: 18px;
    font-size: clamp(22px, 1.9vw, 30px);
    line-height: 1.1;
    z-index: 5;
  }
  nav a {
    color: var(--dim);
    text-decoration: none;
    transition: color .15s ease;
    width: max-content;
    outline: none;
  }
  nav a:hover { color: #C17777; }
  nav a:visited { color: var(--dim); }
  nav a.is-current { color: var(--fg); }

  /* ---------- stage ---------- */
  .stage {
    --slide-w: clamp(340px, 34vw, 620px);
    position: relative;
    height: 100vh;
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  .contact {
    width: var(--slide-w);
    color: var(--fg);
    font-size: clamp(14px, 1.1vw, 17px);
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    gap: 3.2em;
  }

  .block { display: flex; flex-direction: column; gap: 1.2em; }

  .label { color: var(--fg); }

  .email-link {
    color: var(--fg);
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.35);
    padding-bottom: 1px;
    width: max-content;
    transition: color .15s ease, border-color .15s ease;
  }
  .email-link:hover { color: #C17777; border-color: #C17777; }
  .email-link:visited { color: var(--fg); border-color: rgba(255,255,255,0.35); }

  .newsletter-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .newsletter-row .field-label { color: var(--fg); }
  .newsletter-row input[type="email"] {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.6);
    color: var(--fg);
    font: inherit;
    padding: 10px 12px;
    border-radius: 2px;
    outline: none;
    transition: border-color .15s ease;
  }
  .newsletter-row input[type="email"]:focus { border-color: var(--fg); }
  .newsletter-row input[type="email"]::placeholder { color: rgba(255,255,255,0.35); }

  .subscribe {
    align-self: flex-start;
    background: transparent;
    border: 0;
    padding: 0;
    color: var(--fg);
    font: inherit;
    cursor: pointer;
    transition: color .15s ease;
    position: relative;
  }
  .subscribe::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -2px;
    height: 1px;
    background: rgba(255,255,255,0);
    transition: background .15s ease;
  }
  .subscribe:hover { color: #C17777; }
  .subscribe:hover::after { background: #C17777; }
  .subscribe[data-sent="true"] {
    color: var(--dim);
    pointer-events: none;
  }

  @media (max-width: 880px) {
    .stage { --slide-w: 78vw; padding-top: 140px; align-items: start; }
    nav {
      flex-direction: row;
      flex-wrap: wrap;
      top: 28px;
      left: 28px;
      right: 28px;
      gap: 14px 22px;
      font-size: 18px;
    }
  }
</style>
</head>
<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="paper.html">Paper</a>
    <a href="about.html">About</a>
    <a href="draw.html">Draw</a>
    <a href="shop.html">Shop</a>
    <a href="contact.html" class="is-current">Contact</a>
  </nav>

  <main class="stage">
    <section class="contact">

      <div class="block">
        <div class="label">All inquiries:</div>
        <a class="email-link" href="mailto:studio@joshlary.com">studio@joshlary.com</a>
      </div>

      <div class="block">
        <div class="label">Instagram:</div>
        <a class="email-link" href="https://instagram.com/joshlary" target="_blank" rel="noopener">@joshlary</a>
      </div>

      <form class="block" id="newsletter" novalidate>
        <div class="label">Newsletter:</div>
        <label class="newsletter-row">
          <span class="field-label">Email</span>
          <input type="email" name="email" autocomplete="email" spellcheck="false" placeholder="your@email.com" />
        </label>
        <button class="subscribe" type="submit">Subscribe</button>
      </form>

    </section>
  </main>

  <script>
    const SUBSTACK_HANDLE = 'joshlary';

    const form = document.getElementById('newsletter');
    const button = form.querySelector('.subscribe');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const input = form.querySelector('input[type="email"]');
      if (!input.value || !input.checkValidity()) { input.focus(); return; }
      const email = input.value;
      button.textContent = 'Subscribing…';
      try {
        const body = new URLSearchParams({
          email,
          first_url: location.href,
          first_referrer: document.referrer || '',
          current_url: location.href,
          current_referrer: document.referrer || '',
          source: 'subscribe_page'
        });
        await fetch(`https://${SUBSTACK_HANDLE}.substack.com/api/v1/free`, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body
        });
      } catch (err) { /* no-cors hides errors; fall through */ }
      button.textContent = 'Thanks — check your inbox to confirm.';
      button.setAttribute('data-sent', 'true');
      input.value = '';
    });
  </script>

</body>
</html>
